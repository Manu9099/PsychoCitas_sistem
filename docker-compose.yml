version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: psychocitas_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: psychocitas_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: psychocitas_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@psychocitas.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
